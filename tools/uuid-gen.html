<div class="tool-header"><div class="t-icon"><i class="fa-solid fa-fingerprint" aria-hidden="true"></i></div><h1>UUID / ID Generator</h1><p>Generate UUID v4, Short ID (NanoID), atau ULID. Pakai <code style="font-family:monospace;background:#dbeafe;padding:.1rem .4rem;border-radius:4px;font-size:.85rem">crypto.getRandomValues()</code> untuk kualitas acak kriptografis.</p></div>

<script>
const $=id=>document.getElementById(id);
function uuidV4(){const b=new Uint8Array(16);crypto.getRandomValues(b);b[6]=(b[6]&0x0f)|0x40;b[8]=(b[8]&0x3f)|0x80;const h=Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');return h.substring(0,8)+'-'+h.substring(8,12)+'-'+h.substring(12,16)+'-'+h.substring(16,20)+'-'+h.substring(20,32);}
const NANO_AB='useandom-26T198340PX75pxJACKVERYMINDBUSHWOLF_GQZbfghjklqvwyzrict';
function nanoid(len){const b=new Uint8Array(len);crypto.getRandomValues(b);let s='';for(let i=0;i<len;i++)s+=NANO_AB[b[i]&63];return s;}
const ULID_AB='0123456789ABCDEFGHJKMNPQRSTVWXYZ';
function ulid(){let t=Date.now();let ts='';for(let i=9;i>=0;i--){ts=ULID_AB[t%32]+ts;t=Math.floor(t/32);}const b=new Uint8Array(16);crypto.getRandomValues(b);let r='';for(let i=0;i<16;i++)r+=ULID_AB[b[i]&31];return ts+r;}
function hex(len){const b=new Uint8Array(Math.ceil(len/2));crypto.getRandomValues(b);return Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('').substring(0,len);}
function transform(s,c){if(c==='upper')return s.toUpperCase();if(c==='nodash')return s.replace(/-/g,'');return s;}
$('typeSel').addEventListener('change',()=>{$('lenRow').style.display=['nano','hex'].includes($('typeSel').value)?'flex':'none';gen();});
function gen(){const type=$('typeSel').value;const qty=Math.min(1000,Math.max(1,parseInt($('qtyInp').value)||1));const len=Math.min(64,Math.max(4,parseInt($('lenInp').value)||12));const c=$('caseSel').value;const arr=[];for(let i=0;i<qty;i++){let v;if(type==='uuid')v=uuidV4();else if(type==='nano')v=nanoid(len);else if(type==='ulid')v=ulid();else v=hex(len);arr.push(transform(v,c));}$('out').textContent=arr.join('\n');return arr;}
$('genBtn').addEventListener('click',gen);
$('qtyInp').addEventListener('input',gen);
$('lenInp').addEventListener('input',gen);
$('caseSel').addEventListener('change',gen);
$('copyBtn').addEventListener('click',()=>{const t=$('out').textContent;if(!t)return;navigator.clipboard.writeText(t).then(()=>window.CH&&CH.toast&&CH.toast('Semua disalin'));});
$('dlBtn').addEventListener('click',()=>{const t=$('out').textContent;if(!t)return;const blob=new Blob([t],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ids.txt';a.click();});
gen();
</script>
